<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTS</title>
  <style>
    /* popup styles v1.0.0 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 200px;
      background: #1a1a1a;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
      color: #fff;
      padding: 8px;
    }
    
    .option {
      width: 100%;
      cursor: pointer;
      border-radius: 8px;
      position: relative;
      user-select: none;
      overflow: hidden;
      margin-bottom: 8px;
      text-align: center;
      background: #1a1a1a;
      border: 1px solid #333;
      transition: height 0.3s ease;
    }
    
    .option-text {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 10;
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: top 0.3s ease;
    }
    
    .option-img {
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      height: 100%;
      background-image: url('images/demo.jpg');
      background-size: cover;
      background-position: center;
      transition: width 0.3s ease;
      z-index: 1;
    }
    
    /* 缩略图选项 - 正常高度 */
    #optThumb {
      height: 40px;
    }
    #optThumb .option-text {
      top: 50%;
      transform: translateY(-50%);
    }
    #optThumb.on .option-img {
      width: 100%;
    }
    #optThumb.on .option-text { color: #fff; }
    #optThumb:not(.on) .option-text { color: #666; }
    
    /* 覆盖选项 - 双倍高度，黑色遮罩从下往上 */
    #optOverlay {
      height: 80px;
    }
    #optOverlay .option-img {
      width: 100%;
      height: 100%;
    }
    #optOverlay .overlay-bar {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 0;
      background: rgba(0,0,0,0.5);
      z-index: 5;
      transition: height 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #optOverlay .overlay-bar .option-text {
      position: relative;
      color: #fff;
    }
    #optOverlay.on .overlay-bar {
      height: 100%;
    }
    #optOverlay:not(.on) .overlay-bar {
      height: 50%;
    }
    #optOverlay.disabled {
      height: 0;
      opacity: 0;
      cursor: default;
      border: none;
      background: transparent;
      margin-bottom: 0;
      transition: height 0.3s ease, opacity 0.3s ease, margin 0.3s ease;
    }
    #optOverlay.disabled .overlay-bar {
      display: none;
    }
    #optOverlay.disabled .option-img {
      width: 0 !important;
    }
    #optOverlay.disabled .disabled-text {
      display: none;
    }
    
    /* 覆盖选项上方的虚线 - disabled时增加间距 */
    .divider-before-overlay {
      height: 1px;
      margin: 0 16px 8px 16px;
      background: repeating-linear-gradient(
        90deg,
        #ff6b6b 0, #ff6b6b 6px,
        transparent 6px, transparent 8px,
        #ffd93d 8px, #ffd93d 14px,
        transparent 14px, transparent 16px,
        #6bcb77 16px, #6bcb77 22px,
        transparent 22px, transparent 24px,
        #4d96ff 24px, #4d96ff 30px,
        transparent 30px, transparent 32px,
        #ff6b6b 32px
      );
    }
.divider-before-overlay.collapsed {
      margin-bottom: 0;
      height: 0;
      opacity: 0;
      transition: height 0.3s ease, opacity 0.3s ease, margin 0.3s ease;
    }
    
    .divider-after-overlay.collapsed {
      margin-top: 0;
      margin-bottom: 8px;
      transition: margin 0.3s ease;
    }
    
    /* 覆盖选项下方的虚线 - disabled时增加间距 */
    .divider-after-overlay {
      height: 1px;
      margin: 0 16px 8px 16px;
      background: repeating-linear-gradient(
        90deg,
        #ff6b6b 0, #ff6b6b 6px,
        transparent 6px, transparent 8px,
        #ffd93d 8px, #ffd93d 14px,
        transparent 14px, transparent 16px,
        #6bcb77 16px, #6bcb77 22px,
        transparent 22px, transparent 24px,
        #4d96ff 24px, #4d96ff 30px,
        transparent 30px, transparent 32px,
        #ff6b6b 32px
      );
    }
    .divider-after-overlay.collapsed {
      margin-top: 4px;
    }
    
    /* 特写选项 - 三倍高度动态 */
    #optPreview {
      height: 40px;
    }
    #optPreview.on {
      height: 120px;
    }
    #optPreview .option-text {
      top: 50%;
      transform: translateY(-50%);
      transition: all 0.3s ease;
    }
    #optPreview.on .option-img {
      width: 100%;
    }
    #optPreview:not(.on) .option-text { color: #666; }
    #optPreview.on .option-text { color: #fff; }
    
    .divider {
      height: 1px;
      margin: 0 16px 8px 16px;
      background: repeating-linear-gradient(
        90deg,
        #ff6b6b 0, #ff6b6b 6px,
        transparent 6px, transparent 8px,
        #ffd93d 8px, #ffd93d 14px,
        transparent 14px, transparent 16px,
        #6bcb77 16px, #6bcb77 22px,
        transparent 22px, transparent 24px,
        #4d96ff 24px, #4d96ff 30px,
        transparent 30px, transparent 32px,
        #ff6b6b 32px
      );
    }
    
    .lang-btn {
      text-align: center;
      padding: 6px;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
    }
    .lang-btn:hover { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
  <div class="option" id="optThumb">
    <div class="option-img"></div>
    <div class="option-text" data-i18n="thumb">预览</div>
  </div>
  <div class="divider divider-before-overlay collapsed" id="divBeforeOverlay"></div>
  <div class="option" id="optOverlay">
    <div class="option-img"></div>
    <div class="overlay-bar">
      <div class="option-text" data-i18n="overlay">覆盖</div>
    </div>
  </div>
  <div class="divider divider-after-overlay" id="divAfterOverlay"></div>
  <div class="option" id="optPreview">
    <div class="option-img"></div>
    <div class="option-text" data-i18n="preview">特写</div>
  </div>
  <div class="lang-btn" id="langBtn">EN / 中文</div>
  <script src="popup.js"></script>
</body>
</html>
