<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTS</title>
  <style>
    /* popup styles v1.1.2 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 200px;
      background: #1a1a1a;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
      color: #fff;
      padding: 8px;
    }
    
    .option {
      width: 100%;
      cursor: pointer;
      border-radius: 8px;
      position: relative;
      user-select: none;
      overflow: hidden;
      margin-bottom: 8px;
      text-align: center;
      background: #1a1a1a;
      border: 1px solid #333;
    }
    
    .option-text {
      position: absolute;
      left: 0;
      right: 0;
      z-index: 10;
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    .option-img {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-image: url('images/demo.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 1;
    }
    
    #optThumb {
      height: 40px;
    }
    #optThumb .option-text {
      top: 50%;
      transform: translateY(-50%);
    }
    #optThumb.on .option-img {
      opacity: 1;
    }
    #optThumb.on .option-text { color: #fff; }
    #optThumb:not(.on) .option-text { color: #666; }
    
    #optPreview {
      height: 40px;
      transition: height 0.3s ease;
    }
    #optPreview.on {
      height: 120px;
    }
    #optPreview .option-text {
      top: 50%;
      transform: translateY(-50%);
    }
    #optPreview.on .option-img {
      opacity: 1;
    }
    #optPreview:not(.on) .option-text { color: #666; }
    #optPreview.on .option-text { color: #fff; }
    
    .lang-btn {
      text-align: center;
      padding: 6px;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
    }
    .lang-btn:hover { color: rgba(255,255,255,0.7); }
    
    .unsupported-view { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-radius: 8px; flex-direction: column; align-items: center; justify-content: center; }
    body.unsupported .unsupported-view { display: flex; }
    body.unsupported .settings-view { opacity: 0.5; pointer-events: none; }
    body.unsupported .lang-btn { opacity: 0.3; pointer-events: none; }
    
    .unsupported-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }
    .unsupported-title {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 8px;
      text-align: center;
    }
    .unsupported-message {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
      line-height: 1.5;
      text-align: center;
      padding: 0 12px;
    }
    
    @media (prefers-color-scheme: light) {
      body { background: #f5f5f5; color: #1a1a1a; }
      .option { background: #f5f5f5; border-color: #ddd; }
      #optThumb:not(.on) .option-text { color: #999; }
      #optPreview:not(.on) .option-text { color: #999; }
      .lang-btn { color: rgba(0,0,0,0.4); }
      .lang-btn:hover { color: rgba(0,0,0,0.7); }
      .unsupported-view { background: rgba(255,255,255,0.7); }
      .unsupported-title { color: #1a1a1a; }
      .unsupported-message { color: rgba(0,0,0,0.6); }
    }
  </style>
</head>
<body>
  <div class="settings-view">
  <div class="option" id="optThumb">
    <div class="option-img"></div>
    <div class="option-text">预览</div>
  </div>
  <div class="option" id="optPreview">
    <div class="option-img"></div>
    <div class="option-text">特写</div>
  </div>
  </div>
  <div class="unsupported-view">
    <div class="unsupported-icon">⚠</div>
    <div class="unsupported-title" id="unsupportedTitle">不支持此页面</div>
    <div class="unsupported-message" id="unsupportedMessage">浏览器内部页面无法使用此扩展功能</div>
  </div>
  <div class="lang-btn" id="langBtn">EN / 中文</div>
  <script src="popup.js"></script>
</body>
</html>
